name: Build GitHub Pages

# Builds the Astro + Starlight documentation site (guides + the API reference generated from the TSDoc)
# and deploys it to GitHub Pages. Requires Pages to be enabled with "GitHub Actions" as the source
# (repo Settings -> Pages -> Build and deployment -> Source: GitHub Actions).

on:
  # Regenerate on a new library release (the API docs reflect the released version), on doc-site source
  # changes (guides / theme / generator / config), and on manual runs — NOT on every code push to `src`.
  release:
    types: [published]
  push:
    branches: [main]
    paths:
      - docs/**
      - astro.config.ts
      - scripts/docs-gen/**
      - .github/workflows/build-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pages: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cache the slow-to-produce generated artifacts (the ts-morph API markdown + the satori OG images),
      # keyed by the sources that determine them. On a hit the generator's own cache-hash skips regeneration
      # and the OG content-hash manifest reuses unchanged cards; restore-keys give a warm partial cache.
      - name: Restore generated docs cache
        uses: actions/cache@v4
        with:
          path: |
            docs/src/content/docs/api
            docs/public/og
          key: docs-gen-${{ hashFiles('src/**/*.ts', 'scripts/docs-gen/**', 'docs/src/content/docs/**/*.md', 'docs/src/content/docs/**/*.mdx', 'astro.config.ts', 'package-lock.json') }}
          restore-keys: |
            docs-gen-

      - name: Build documentation site
        run: npm run docs:build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

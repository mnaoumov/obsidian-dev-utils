  <path d="M16 5.4 L12.1 9 L14.7 14.8 L16 14.8 Z" fill="#c4b5fd" />
  <path d="M16 5.4 L19.9 9 L17.3 14.8 L16 14.8 Z" fill="#8b5cf6" />

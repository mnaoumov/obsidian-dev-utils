    <rect x="8.9" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="10.8" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="12.7" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="14.6" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="16.5" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="18.4" y="21.2" width="1.5" height="1.05" rx="0.25" /><rect x="20.3" y="21.2" width="1.5" height="1.05" rx="0.25" />
